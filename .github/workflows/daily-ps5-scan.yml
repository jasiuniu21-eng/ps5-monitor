name: PS5 Price Monitor

on:
  schedule:
    - cron: '0 */2 * * *'  # co 2h UTC
  workflow_dispatch:

# Tylko jeden skan na raz — kolejne czekają, żeby nie nadpisać state/seen.json
concurrency:
  group: ps5-monitor-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore seen-offers cache
        id: cache-seen
        uses: actions/cache@v4
        with:
          path: state
          key: ps5-monitor-seen-${{ github.run_id }}
          restore-keys: |
            ps5-monitor-seen-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run PS5 Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scanner.py

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ps5-results-${{ github.run_id }}
          path: results/
          retention-days: 30
